<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DOPAMINE | ANATOMIE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-container">
            <span class="nav-brand">DOPAMINE.LAB</span>
            <div class="nav-menu">
                <a href="index.html">ACCUEIL</a>
                <a href="anatomie.html" class="active">01. ANATOMIE</a>
                <a href="chimie.html">02. CHIMIE</a>
                <a href="mecanisme.html">03. MÉCANISME</a>
                <a href="addiction.html">04. ADDICTION</a>
            </div>
        </div>
    </nav>
    <header class="hero">
        <h1>L'ANATOMIE</h1>
        <p>Cliquez sur les zones pour explorer le cerveau.</p>
    </header>
    <main class="container">
        <div class="card bento-grid">
            <div class="scheme-container">
                <svg id="brain-map" viewBox="0 0 500 350">
                    <path d="M100,200 C100,100 200,50 300,50 C400,50 450,150 450,220 C450,280 380,300 300,300 C220,300 150,280 100,250 Z" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="3"/>
                    <g id="atv-zone" style="cursor:pointer">
                        <circle cx="280" cy="220" r="20" fill="#3b82f6"/>
                        <text x="280" y="225" text-anchor="middle" fill="white" font-weight="bold" font-size="12">ATV</text>
                    </g>
                    <g id="accumbens-zone" style="cursor:pointer">
                        <circle cx="240" cy="180" r="20" fill="#10b981"/>
                        <text x="240" y="185" text-anchor="middle" fill="white" font-weight="bold" font-size="12">NAc</text>
                    </g>
                </svg>
            </div>
            <div id="info-panel" class="info-panel hidden">
                <h3 id="panel-title">Zone</h3>
                <p id="panel-text">Chargement...</p>
            </div>
        </div>
    </main>
    <script>
        const zoneData = {
            'atv-zone': { title: "Aire Tegmentale Ventrale", text: "Point de départ de la dopamine." },
            'accumbens-zone': { title: "Noyau Accumbens", text: "Centre majeur du plaisir." }
        };
        document.getElementById('atv-zone').onclick = () => showInfo('atv-zone');
        document.getElementById('accumbens-zone').onclick = () => showInfo('accumbens-zone');
        
        function showInfo(id) {
            document.getElementById('panel-title').innerText = zoneData[id].title;
            document.getElementById('panel-text').innerText = zoneData[id].text;
            document.getElementById('info-panel').classList.remove('hidden');
        }
    </script>
</body>
</html>
